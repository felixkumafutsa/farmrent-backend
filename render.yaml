services:
  - type: web
    name: farm-inputs-backend
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start:prod"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: farm-inputs-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    autoDeploy: true

databases:
  - name: farm-inputs-db
    databaseName: farm_inputs
    user: farm_inputs_user
    plan: free
